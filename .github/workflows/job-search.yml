name: AI Job Search Agent

on:
  # 6:00 AM Eastern = 11:00 AM UTC (EST) or 10:00 AM UTC (EDT)
  # Using 11:00 UTC covers EST; adjust to 10:00 for DST (summer)
  schedule:
    - cron: '0 11 * * *'   # ~6 AM ET (winter / EST)
    - cron: '0 23 * * *'   # ~6 PM ET (winter / EST)
  workflow_dispatch:        # Manual trigger from GitHub UI
    inputs:
      dry_run:
        description: 'Dry run (skip email)'
        required: false
        default: 'false'
        type: boolean

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore resume profile cache
        uses: actions/cache@v4
        with:
          path: output/logs/resume_profile.json
          key: resume-profile-${{ hashFiles('input/resume.pdf') }}

      - name: Restore seen-jobs log
        uses: actions/cache@v4
        with:
          path: output/logs/seen_jobs.json
          key: seen-jobs-${{ github.run_number }}
          restore-keys: |
            seen-jobs-

      - name: Create required directories
        run: mkdir -p input output/resumes output/reports output/logs

      - name: Decode resume PDF from secret
        env:
          RESUME_PDF_BASE64: ${{ secrets.RESUME_PDF_BASE64 }}
        run: |
          echo "$RESUME_PDF_BASE64" | base64 --decode > input/resume.pdf
          echo "Resume PDF restored ($(du -sh input/resume.pdf | cut -f1))"

      - name: Run Job Search Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          USE_SENDGRID: ${{ secrets.USE_SENDGRID }}
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python main.py --dry-run
          else
            python main.py
          fi

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-report-${{ github.run_number }}
          path: |
            output/reports/
            output/logs/agent.log
          retention-days: 7

      - name: Save seen-jobs log
        if: always()
        uses: actions/cache/save@v4
        with:
          path: output/logs/seen_jobs.json
          key: seen-jobs-${{ github.run_number }}
