name: AI Job Search Agent

# ┌─────────────────────────────────────────────────────────────────────────┐
# │                      CHANGE RUN TIMES HERE                              │
# │                                                                         │
# │  GitHub Actions schedules use UTC. Use the table below to convert.      │
# │                                                                         │
# │  ET → UTC conversion:                                                   │
# │    Winter (Nov–Mar, EST = UTC-5):  ET + 5h = UTC                        │
# │    Summer (Mar–Nov, EDT = UTC-4):  ET + 4h = UTC                        │
# │                                                                         │
# │  Common ET times and their UTC cron equivalents:                        │
# │                                                                         │
# │   Desired ET time  │  Winter UTC cron  │  Summer UTC cron               │
# │  ─────────────────────────────────────────────────────────              │
# │   6:00 AM ET       │  0 11 * * *       │  0 10 * * *                    │
# │   7:00 AM ET       │  0 12 * * *       │  0 11 * * *                    │
# │   8:00 AM ET       │  0 13 * * *       │  0 12 * * *                    │
# │   9:00 AM ET       │  0 14 * * *       │  0 13 * * *                    │
# │   12:00 PM ET      │  0 17 * * *       │  0 16 * * *                    │
# │   6:00 PM ET       │  0 23 * * *       │  0 22 * * *                    │
# │   7:00 PM ET       │  0 0 * * *        │  0 23 * * *                    │
# │   8:00 PM ET       │  0 1 * * *        │  0 0 * * *                     │
# │                                                                         │
# │  TO CHANGE TIMES: edit the two cron lines in the `schedule:` block      │
# │  below. Replace with any row from the table above.                      │
# │                                                                         │
# │  Current schedule: 6:00 AM ET  and  6:00 PM ET (winter/EST)            │
# └─────────────────────────────────────────────────────────────────────────┘

on:
  schedule:
    - cron: '0 11 * * *'   # 6:00 AM ET (winter EST) — change this line
    - cron: '0 23 * * *'   # 6:00 PM ET (winter EST) — change this line
  workflow_dispatch:        # Also runnable manually from GitHub Actions UI
    inputs:
      dry_run:
        description: 'Dry run — find jobs and tailor resumes but skip sending email'
        required: false
        default: 'false'
        type: boolean
      since_hours:
        description: 'How many hours back to look for jobs (default 12)'
        required: false
        default: '12'
        type: string

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main code (master branch)
        uses: actions/checkout@v4

      - name: Checkout resume files (resume-assets branch)
        uses: actions/checkout@v4
        with:
          ref: resume-assets
          path: _resume_assets   # temporary staging folder (not input/)

      - name: Copy resume files into input/
        run: |
          mkdir -p input
          if [ -f "_resume_assets/resume.pdf" ]; then
            cp _resume_assets/resume.pdf input/resume.pdf
            echo "resume.pdf copied ($(du -sh input/resume.pdf | cut -f1))"
          else
            echo "ERROR: resume.pdf not found in resume-assets branch"
            exit 1
          fi
          if [ -f "_resume_assets/resume.tex" ]; then
            cp _resume_assets/resume.tex input/resume.tex
            echo "resume.tex copied ($(wc -l < input/resume.tex) lines)"
          else
            echo "resume.tex not found — LaTeX pipeline will fall back to ReportLab"
          fi
          rm -rf _resume_assets

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore resume profile cache
        uses: actions/cache@v4
        with:
          path: output/logs/resume_profile.json
          key: resume-profile-${{ hashFiles('input/resume.pdf') }}

      - name: Restore seen-jobs log
        uses: actions/cache@v4
        with:
          path: output/logs/seen_jobs.json
          key: seen-jobs-${{ github.run_number }}
          restore-keys: |
            seen-jobs-

      - name: Create required directories
        run: mkdir -p output/resumes output/reports output/logs

      - name: Run Job Search Agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          USE_SENDGRID: ${{ secrets.USE_SENDGRID }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ github.event.inputs.since_hours }}" ]; then
            ARGS="$ARGS --since-hours ${{ github.event.inputs.since_hours }}"
          fi
          python main.py $ARGS

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: job-report-${{ github.run_number }}
          path: |
            output/reports/
            output/logs/agent.log
          retention-days: 7

      - name: Save seen-jobs log
        if: always()
        uses: actions/cache/save@v4
        with:
          path: output/logs/seen_jobs.json
          key: seen-jobs-${{ github.run_number }}
